# Python Flask example — starts the Flask dev server as a long-lived process.

[provider]
strict_warnings = true
extra_system_prompt = "This is a Python Flask app. Use a headed browser (using `agent-browser` skill and record a video of the test run into the run artifacts) for UI tests. Use curl or fetch for API tests."
base_url = "http://localhost:5111"
agent_args = [
    "--dangerously-skip-permissions",
    "--no-session-persistence",
    "--model",
    "haiku",
    "--effort",
    "medium",
]

[commands.install]
kind = "short_lived"
cmd = "pip3 install -r requirements.txt"

[commands.server]
kind = "long_lived"
cmd = "python3 app.py"
readiness_url = "http://localhost:5111/health"
